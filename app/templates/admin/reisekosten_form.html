{% extends 'admin/base.html' %}
{% block title %}Admin · Reisekosten bearbeiten{% endblock %}
{% block heading %}Reisekostenantrag bearbeiten{% endblock %}

{% block admin_content %}
<form method="post" class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5 sm:p-8 space-y-5 max-w-2xl">
    {% if item.user_email %}
    <div class="text-xs text-gray-500">Eingereicht von <span class="font-semibold">{{ item.user_email }}</span></div>
    {% endif %}

    <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Reiseziel <span class="text-rose-500">*</span></label>
        <input name="destination" required value="{{ item.destination or '' }}"
               class="w-full rounded-lg border border-gray-200 px-3 py-2">
    </div>
    <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Zweck</label>
        <input name="purpose" value="{{ item.purpose or '' }}"
               class="w-full rounded-lg border border-gray-200 px-3 py-2">
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Antragsdatum <span class="text-rose-500">*</span></label>
            <input type="date" name="antrag_date" required value="{{ item.antrag_date or '' }}"
                   class="w-full rounded-lg border border-gray-200 px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Reise von</label>
            <input type="date" name="travel_start_date" value="{{ item.travel_start_date or '' }}"
                   class="w-full rounded-lg border border-gray-200 px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Reise bis</label>
            <input type="date" name="travel_end_date" value="{{ item.travel_end_date or '' }}"
                   class="w-full rounded-lg border border-gray-200 px-3 py-2">
        </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Geschätzt (€)</label>
            <input type="number" step="0.01" name="estimated_amount" value="{{ item.estimated_amount if item.estimated_amount is not none else '' }}"
                   class="w-full rounded-lg border border-gray-200 px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Abschlag (€)</label>
            <input type="number" step="0.01" name="advance_amount" value="{{ item.advance_amount if item.advance_amount is not none else '' }}"
                   class="w-full rounded-lg border border-gray-200 px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Endbetrag (€)</label>
            <input type="number" step="0.01" name="final_amount" value="{{ item.final_amount if item.final_amount is not none else '' }}"
                   class="w-full rounded-lg border border-gray-200 px-3 py-2">
        </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Abrechnung eingereicht</label>
            <input type="date" name="abrechnung_date" value="{{ item.abrechnung_date or '' }}"
                   class="w-full rounded-lg border border-gray-200 px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Abgerechnet am</label>
            <input type="date" name="settlement_date" value="{{ item.settlement_date or '' }}"
                   class="w-full rounded-lg border border-gray-200 px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Status</label>
            <select name="status" class="w-full rounded-lg border border-gray-200 px-3 py-2 bg-white">
                {% for k in ['antrag_submitted', 'antrag_approved', 'antrag_rejected', 'abrechnung_submitted', 'settled'] %}
                    <option value="{{ k }}" {% if item.status == k %}selected{% endif %}>{{ k }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="flex flex-col-reverse sm:flex-row sm:justify-end gap-3 pt-2">
        <a href="{{ url_for('admin.reisekosten_list') }}"
           class="px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 text-sm font-semibold text-center">Abbrechen</a>
        <button type="submit"
                class="px-4 py-2 rounded-lg bg-gray-900 text-white text-sm font-semibold hover:bg-gray-700">
            Speichern
        </button>
    </div>
</form>
{% endblock %}
