{% extends 'base.html' %}
{% block title %}{{ title }} · TU Berlin{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm border border-gray-200 p-6 sm:p-8 text-center">
    <h1 class="text-xl sm:text-2xl font-bold text-gray-900 tracking-tight mb-2">{{ title }}</h1>
    <p class="text-gray-600 text-sm">{{ message }}</p>
    <a href="{{ url_for('buildings.index') }}"
       class="mt-6 inline-block px-4 py-2 rounded-lg bg-gray-900 text-white text-sm font-semibold hover:bg-gray-700">
        Zur Startseite
    </a>
</div>
{% endblock %}
