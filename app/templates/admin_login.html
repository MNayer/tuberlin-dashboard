{% extends 'base.html' %}
{% block title %}Admin Login · TU Berlin{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 tracking-tight mb-2">Admin-Bereich</h1>
    <p class="text-gray-500 text-sm mb-6">Bitte Admin-Passwort eingeben.</p>

    <form method="post" class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5 sm:p-8 space-y-4">
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Passwort</label>
            <input type="password" name="password" required autofocus
                   class="w-full rounded-lg border border-gray-200 px-3 py-2 focus:border-gray-400 focus:ring-0">
        </div>
        <button type="submit"
                class="w-full px-4 py-2.5 rounded-lg bg-gray-900 text-white text-sm font-semibold hover:bg-gray-700">
            Anmelden
        </button>
    </form>
</div>
{% endblock %}
