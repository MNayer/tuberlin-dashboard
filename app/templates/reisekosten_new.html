{% extends 'base.html' %}
{% block title %}Neuer Reisekostenantrag · TU Berlin{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <a href="{{ url_for('reisekosten.index') }}" class="text-sm text-gray-500 hover:text-gray-900 inline-flex items-center gap-1 mb-4">
        ← Zurück zur Übersicht
    </a>
    <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 tracking-tight mb-6">Neuer Reisekostenantrag</h1>

    <form method="post" class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5 sm:p-8 space-y-5">
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Reiseziel <span class="text-rose-500">*</span></label>
            <input name="destination" required value="{{ form.destination or '' }}"
                   class="w-full rounded-lg border border-gray-200 px-3 py-2 focus:border-gray-400 focus:ring-0">
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Zweck</label>
            <input name="purpose" value="{{ form.purpose or '' }}"
                   class="w-full rounded-lg border border-gray-200 px-3 py-2 focus:border-gray-400 focus:ring-0">
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Antragsdatum <span class="text-rose-500">*</span></label>
                <input type="date" name="antrag_date" required value="{{ form.antrag_date or '' }}"
                       class="w-full rounded-lg border border-gray-200 px-3 py-2">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Reise von</label>
                <input type="date" name="travel_start_date" value="{{ form.travel_start_date or '' }}"
                       class="w-full rounded-lg border border-gray-200 px-3 py-2">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Reise bis</label>
                <input type="date" name="travel_end_date" value="{{ form.travel_end_date or '' }}"
                       class="w-full rounded-lg border border-gray-200 px-3 py-2">
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Geschätzte Kosten (€)</label>
                <input type="number" step="0.01" name="estimated_amount" value="{{ form.estimated_amount or '' }}"
                       class="w-full rounded-lg border border-gray-200 px-3 py-2"
                       placeholder="optional">
                <p class="text-xs text-gray-400 mt-1">Falls angegeben, bitte auch Abschlagszahlung ausfüllen.</p>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Abschlagszahlung (€)</label>
                <input type="number" step="0.01" name="advance_amount" value="{{ form.advance_amount or '' }}"
                       class="w-full rounded-lg border border-gray-200 px-3 py-2"
                       placeholder="0,00 falls keine">
                <p class="text-xs text-gray-400 mt-1">Wieviel die Universität im Voraus bezahlt hat.</p>
            </div>
        </div>

        <div class="flex flex-col-reverse sm:flex-row sm:justify-end gap-3 pt-2">
            <a href="{{ url_for('reisekosten.index') }}"
               class="px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 text-sm font-semibold text-center">Abbrechen</a>
            <button type="submit"
                    class="px-4 py-2 rounded-lg bg-gray-900 text-white text-sm font-semibold hover:bg-gray-700">
                Antrag einreichen
            </button>
        </div>
    </form>
</div>
{% endblock %}
