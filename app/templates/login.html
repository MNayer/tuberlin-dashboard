{% extends 'base.html' %}
{% block title %}Login · TU Berlin{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 tracking-tight mb-2">Anmelden</h1>
    <p class="text-gray-500 text-sm mb-6">
        Gib deine <span class="font-semibold">@{{ domain }}</span>-Adresse ein und wir senden dir einen Login-Link per E-Mail.
    </p>

    <form method="post" class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5 sm:p-8 space-y-4">
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">E-Mail-Adresse</label>
            <input type="email" name="email" required autofocus
                   placeholder="vorname.nachname@{{ domain }}"
                   class="w-full rounded-lg border border-gray-200 px-3 py-2 focus:border-gray-400 focus:ring-0">
        </div>
        <button type="submit"
                class="w-full px-4 py-2.5 rounded-lg bg-gray-900 text-white text-sm font-semibold hover:bg-gray-700">
            Login-Link senden
        </button>
    </form>
</div>
{% endblock %}
