{% extends 'base.html' %}
{% block title %}Änderung vorschlagen · TU Berlin{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <a href="{{ url_for('buildings.index') }}" class="text-sm text-gray-500 hover:text-gray-900 inline-flex items-center gap-1 mb-4">
        ← Zurück zur Übersicht
    </a>
    <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 tracking-tight mb-2">Änderung vorschlagen</h1>
    <p class="text-gray-500 text-sm mb-6">Dein Vorschlag wird von den Admins geprüft, bevor er übernommen wird.</p>

    <form method="post" class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5 sm:p-8 space-y-5"
          x-data="{ kind: 'edit' }" x-init="kind = document.querySelector('input[name=kind]:checked')?.value || 'edit'">

        <div class="flex flex-col sm:flex-row gap-2">
            <label class="flex-1 flex items-center gap-2 border border-gray-200 rounded-lg px-3 py-2 cursor-pointer has-[:checked]:border-gray-900 has-[:checked]:bg-gray-50">
                <input type="radio" name="kind" value="edit" checked
                       onchange="document.getElementById('edit-fields').classList.remove('hidden'); document.getElementById('new-fields').classList.add('hidden');">
                <span class="text-sm font-semibold">Bestehendes Gebäude</span>
            </label>
            <label class="flex-1 flex items-center gap-2 border border-gray-200 rounded-lg px-3 py-2 cursor-pointer has-[:checked]:border-gray-900 has-[:checked]:bg-gray-50">
                <input type="radio" name="kind" value="new"
                       onchange="document.getElementById('new-fields').classList.remove('hidden'); document.getElementById('edit-fields').classList.add('hidden');">
                <span class="text-sm font-semibold">Neues Gebäude</span>
            </label>
        </div>

        <div id="edit-fields" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Gebäude</label>
                <select name="building_id" class="w-full rounded-lg border border-gray-200 px-3 py-2 bg-white">
                    <option value="">— bitte wählen —</option>
                    {% for b in buildings %}
                        <option value="{{ b.id }}">{{ b.kuerzel }} — {{ b.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Neuer Status</label>
                <select name="status" class="w-full rounded-lg border border-gray-200 px-3 py-2 bg-white">
                    <option value="">— unverändert —</option>
                    <option value="healthy">Betriebsbereit</option>
                    <option value="impaired">Eingeschränkt</option>
                    <option value="closed">Geschlossen</option>
                </select>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Arbeitsplätze</label>
                    <input type="number" name="workplaces" class="w-full rounded-lg border border-gray-200 px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Fläche (m²)</label>
                    <input type="number" step="0.01" name="size_sqm" class="w-full rounded-lg border border-gray-200 px-3 py-2">
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Quelle/Link</label>
                <input type="url" name="news_link" placeholder="https://..." class="w-full rounded-lg border border-gray-200 px-3 py-2">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Notizen</label>
                <textarea name="notes" rows="3" class="w-full rounded-lg border border-gray-200 px-3 py-2"></textarea>
            </div>
        </div>

        <div id="new-fields" class="space-y-5 hidden">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Kürzel</label>
                    <input name="kuerzel" class="w-full rounded-lg border border-gray-200 px-3 py-2">
                </div>
                <div class="sm:col-span-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Name</label>
                    <input name="name" class="w-full rounded-lg border border-gray-200 px-3 py-2">
                </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Adresse</label>
                    <input name="adresse" class="w-full rounded-lg border border-gray-200 px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Campus</label>
                    <input name="campus" class="w-full rounded-lg border border-gray-200 px-3 py-2">
                </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Status</label>
                    <select name="status" class="w-full rounded-lg border border-gray-200 px-3 py-2 bg-white">
                        <option value="healthy">Betriebsbereit</option>
                        <option value="impaired">Eingeschränkt</option>
                        <option value="closed">Geschlossen</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Arbeitsplätze</label>
                    <input type="number" name="workplaces" class="w-full rounded-lg border border-gray-200 px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Fläche (m²)</label>
                    <input type="number" step="0.01" name="size_sqm" class="w-full rounded-lg border border-gray-200 px-3 py-2">
                </div>
            </div>
            <div class="flex items-center gap-2">
                <input type="checkbox" id="is_major" name="is_major" value="1" class="w-4 h-4 rounded">
                <label for="is_major" class="text-sm">Hauptgebäude</label>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Quelle/Link</label>
                <input type="url" name="news_link" placeholder="https://..." class="w-full rounded-lg border border-gray-200 px-3 py-2">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Notizen</label>
                <textarea name="notes" rows="3" class="w-full rounded-lg border border-gray-200 px-3 py-2"></textarea>
            </div>
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Nachricht an Admin (optional)</label>
            <textarea name="message" rows="2" class="w-full rounded-lg border border-gray-200 px-3 py-2"></textarea>
        </div>

        <div class="flex flex-col-reverse sm:flex-row sm:justify-end gap-3 pt-2">
            <a href="{{ url_for('buildings.index') }}"
               class="px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 text-sm font-semibold text-center">Abbrechen</a>
            <button type="submit"
                    class="px-4 py-2 rounded-lg bg-gray-900 text-white text-sm font-semibold hover:bg-gray-700">
                Vorschlag einreichen
            </button>
        </div>
    </form>
</div>
{% endblock %}
